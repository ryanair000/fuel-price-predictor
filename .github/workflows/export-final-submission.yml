name: Export final submission

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Upload project archive
        uses: actions/upload-artifact@v4
        with:
          name: project-export
          path: |
            app.py
            README.md
            DATA_PROVENANCE.md
            requirements.txt
            requirements-dev.txt
            appendices
            data
            docs
            notebooks
            outputs
            scripts
            src
            tests
          retention-days: 1
          if-no-files-found: error
          include-hidden-files: false
