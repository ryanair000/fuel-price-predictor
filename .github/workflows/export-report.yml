name: Export report for TOC repair

on:
  push:
    branches: [main]
    paths:
      - scripts/.export-report

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm report exists
        run: test -s docs/Ryan_Final_Project_Report.docx

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: ryan-final-project-report
          path: docs/Ryan_Final_Project_Report.docx
          if-no-files-found: error
          retention-days: 1
